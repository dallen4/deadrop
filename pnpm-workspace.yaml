packages:
  - shared
  - web
  - worker
  - cli
  - vscode-extension
  - tests

onlyBuiltDependencies:
  - '@sentry/cli'
  # bun's postinstall (node install.js) materializes the platform binary from
  # its @oven/bun-* optional deps; without it `pnpm -F cli compile` has no bun.
  - bun
  - bufferutil
  - esbuild
  - esbuild-plugin-define
  - esbuild-plugin-environment
  - fsevents
  - node-datachannel
  - sharp
  - unrs-resolver
  - utf-8-validate
  - workerd

publicHoistPattern:
  - next
