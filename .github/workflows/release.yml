name: Release
on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset:publish
          version: pnpm changeset:version
          commit: 'chore: version packages'
          title: 'chore: version packages'
          # Disabled: races cli_publish_workflow.yml's release creation after changeset-publish.js renames cli -> deadrop
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
          PEER_SERVER_URL: ${{ secrets.PEER_SERVER_URL }}
          TURN_USERNAME: ${{ secrets.TURN_USERNAME }}
          TURN_PWD: ${{ secrets.TURN_PWD }}
          DEADROP_API_URL: ${{ secrets.DEADROP_API_URL }}
          DEADROP_APP_URL: ${{ secrets.DEADROP_APP_URL }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      - name: Trigger CLI binary release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          version=$(echo "$PUBLISHED" | jq -r '.[] | select(.name == "deadrop") | .version')
          if [ -z "$version" ]; then
            echo "deadrop package not in published set; skipping binary build"
            exit 0
          fi
          tag="deadrop@${version}"
          # changeset publish's tag isn't reliably on origin when we dispatch by
          # ref below, so create + push it ourselves (idempotent) first.
          git tag "$tag" 2>/dev/null || true
          git push origin "refs/tags/$tag" 2>/dev/null || true
          # Wait for the ref to be resolvable before dispatching, else GitHub
          # returns 422 No ref found.
          for i in $(seq 1 10); do
            if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/$tag" >/dev/null 2>&1; then
              break
            fi
            echo "waiting for $tag to appear on origin ($i)..."
            sleep 3
          done
          echo "Dispatching CLI binary build for $tag"
          gh workflow run cli_publish_workflow.yml --ref "$tag"
      - name: Restore cli/package.json name
        if: always()
        run: git checkout -- cli/package.json

  vscode-extension:
    name: Publish VS Code extension
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check marketplace version
        id: check
        working-directory: vscode-extension
        run: |
          local_version=$(jq -r .version package.json)
          marketplace_version=$(pnpm exec vsce show n1eky.deadrop-vsc --json | jq -r '.versions[0].version')
          echo "local=$local_version marketplace=$marketplace_version"
          if [ "$local_version" = "$marketplace_version" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          elif [ "$(printf '%s\n%s' "$marketplace_version" "$local_version" | sort -V | tail -1)" = "$local_version" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "local version is behind marketplace; refusing to publish"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build extension
        if: steps.check.outputs.publish == 'true'
        run: pnpm vscode:build
        env:
          PEER_SERVER_URL: ${{ secrets.PEER_SERVER_URL }}
          TURN_USERNAME: ${{ secrets.TURN_USERNAME }}
          TURN_PWD: ${{ secrets.TURN_PWD }}
          DEADROP_API_URL: ${{ secrets.DEADROP_API_URL }}
          DEADROP_APP_URL: ${{ secrets.DEADROP_APP_URL }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      - name: Package per-platform vsixes
        if: steps.check.outputs.publish == 'true'
        working-directory: vscode-extension
        run: |
          mkdir -p vsix
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64 alpine-x64 alpine-arm64 win32-x64; do
            node scripts/stage-native.js "$target"
            pnpm exec vsce package --no-dependencies --target "$target" -o "vsix/deadrop-vsc-$target.vsix"
          done
      - name: Publish to marketplace
        if: steps.check.outputs.publish == 'true'
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --packagePath vsix/*.vsix
