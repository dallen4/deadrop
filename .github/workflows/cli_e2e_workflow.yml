name: CLI E2E Tests

# CLI-to-CLI drop/grab e2e (Vitest). Two `deadrop` processes establish a real
# node-datachannel WebRTC connection against the deployed worker. The worker is
# untouched by this suite, so it runs against whatever DEADROP_API_URL points
# at (the production worker); no worker deploy is gated on it.
on:
  push:
    branches: [main, alpha]
    paths:
      - 'cli/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/cli_e2e_workflow.yml'
  workflow_dispatch:

jobs:
  cli-e2e:
    # Two local WebRTC peers cannot complete ICE in the GitHub Linux container
    # (same constraint as the web Playwright suite) — must be macOS.
    runs-on: macos-latest
    timeout-minutes: 15
    # No `environment:`: it would make GitHub mint a deployment that feeds the
    # deployment_status loop. Every secret this job uses is repo-level.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run CLI e2e tests
        env:
          # Build-time: esbuild bakes DEADROP_API_URL + PEER_SERVER_URL into the
          # bundle (and guards on both), so they must be present for `pnpm build`.
          DEADROP_API_URL: ${{ secrets.DEADROP_API_URL }}
          PEER_SERVER_URL: ${{ secrets.PEER_SERVER_URL }}
          DEADROP_APP_URL: ${{ vars.DEADROP_APP_URL }}
          CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
          # Runtime: initPeer reads the TURN creds from the env at run time.
          TURN_USERNAME: ${{ secrets.TURN_USERNAME }}
          TURN_PWD: ${{ secrets.TURN_PWD }}
          # The stable drop test token the dropper sends to bypass captcha/
          # rate-limits. The worker verifies it against the persistent Redis
          # value (test_tkn)
          DROP_TEST_TOKEN: ${{ secrets.DROP_TEST_TOKEN }}
        # test:e2e builds dist/deadrop.js, then runs the Vitest e2e config.
        run: CI=true pnpm -F cli test:e2e
