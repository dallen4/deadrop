name: Release CLI Binaries
on:
  push:
    tags:
      - 'deadrop@*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. deadrop@0.3.0)'
        required: true

jobs:
  cli-compile-binaries:
    name: Compile binary (${{ matrix.bun-target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            bun-target: bun-darwin-arm64
            artifact-name: deadrop-darwin-arm64
          - runner: macos-13
            bun-target: bun-darwin-x64
            artifact-name: deadrop-darwin-x64
          - runner: ubuntu-latest
            bun-target: bun-linux-x64
            artifact-name: deadrop-linux-x64
          - runner: windows-latest
            bun-target: bun-windows-x64
            artifact-name: deadrop-windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Compile binary
        shell: bash
        env:
          PEER_SERVER_URL: ${{ secrets.PEER_SERVER_URL }}
          TURN_USERNAME: ${{ secrets.TURN_USERNAME }}
          TURN_PWD: ${{ secrets.TURN_PWD }}
          DEADROP_API_URL: ${{ secrets.DEADROP_API_URL }}
          DEADROP_APP_URL: ${{ secrets.DEADROP_APP_URL }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
        run: |
          cd cli
          pnpm install --frozen-lockfile
          (cd node_modules/bun && node install.js)
          export DEADROP_API_URL=$DEADROP_API_URL
          export DEADROP_APP_URL=$DEADROP_APP_URL
          export PEER_SERVER_URL=$PEER_SERVER_URL
          export TURN_USERNAME=$TURN_USERNAME
          export TURN_PWD=$TURN_PWD
          export CLERK_PUBLISHABLE_KEY=$CLERK_PUBLISHABLE_KEY
          pnpm compile
      - name: Rename binary
        shell: bash
        run: |
          cd cli/dist
          mv deadrop ${{ matrix.artifact-name }} 2>/dev/null || mv deadrop.exe ${{ matrix.artifact-name }}.exe 2>/dev/null || true
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: cli/dist/${{ matrix.artifact-name }}*
          retention-days: 1

  cli-release:
    name: Create GitHub Release
    needs: cli-compile-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: '${{ secrets.GITHUB_TOKEN }}'
          automatic_release_tag: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          files: dist/*
