name: Cross-Platform E2E Tests

# Runs the 4-way CLI×Web drop/grab matrix (cli→cli, cli→web, web→cli, web→web)
# against the deployed stack.
#
# Triggered three ways:
#   1. push/PR on cli, shared, or tests paths → BASE_URL defaults to alpha.deadrop.io
#   2. deployment_status (Vercel fires this) → resolves URL the same way web_ci does
#   3. workflow_dispatch → manual run against alpha.deadrop.io
on:
  push:
    branches: [main, alpha]
    paths:
      - 'cli/**'
      - 'shared/**'
      - 'tests/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/e2e_ci_workflow.yml'
  pull_request:
    branches: [main, alpha]
    paths:
      - 'cli/**'
      - 'shared/**'
      - 'tests/**'
  deployment_status:
  workflow_dispatch:

concurrency:
  # For deployment_status, cancel superseded runs per environment (same as web_ci).
  # For push/PR, cancel per ref so a new push cancels an in-flight run.
  group: ${{ github.workflow }}-${{ github.event.deployment.environment || github.ref }}
  cancel-in-progress: true

jobs:
  cross-platform-e2e:
    # deployment_status fires for every state change (pending, error, failure,
    # success). Only run on a successful deploy.
    if: github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success'
    runs-on: macos-latest
    timeout-minutes: 20
    # Preview environment — same rationale as cli_e2e: Production key is expired
    # and we don't want this coupled to Production deploys.
    environment: Preview
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          # node 24 hangs Playwright browser install on macOS (chromium stalls
          # silently after download completes).
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        env:
          DEADROP_API_URL: ${{ secrets.DEADROP_API_URL }}
          PEER_SERVER_URL: ${{ secrets.PEER_SERVER_URL }}
          TURN_USERNAME: ${{ secrets.TURN_USERNAME }}
          TURN_PWD: ${{ secrets.TURN_PWD }}
        run: pnpm -F cli build

      - name: Install Playwright browsers
        run: pnpm -F tests exec playwright install chromium --with-deps

      - name: Resolve XPLAT_BASE_URL
        id: resolve-url
        shell: bash
        # Namespaced as XPLAT_ because Vitest/Vite reserves BASE_URL for its own
        # base path and would clobber it (see tests/utils/config.ts).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_SHA: ${{ github.event.deployment.sha }}
          DEPLOY_ENV: ${{ github.event.deployment.environment }}
          RAW_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          if [ "${{ github.event_name }}" != "deployment_status" ]; then
            # push / pull_request / workflow_dispatch — always test alpha
            echo "XPLAT_BASE_URL=https://alpha.deadrop.io/" >> "$GITHUB_ENV"
            exit 0
          fi

          BRANCHES=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/commits/$DEPLOY_SHA/branches-where-head" \
            | node -e "const d=require('fs').readFileSync(0,'utf8');try{console.log(JSON.parse(d).map(b=>b.name).join(' '))}catch{}")
          echo "Deployment commit is head of: [$BRANCHES]"

          if [ "$DEPLOY_ENV" = "Production" ]; then
            echo "XPLAT_BASE_URL=https://deadrop.io/" >> "$GITHUB_ENV"
          elif printf '%s' " $BRANCHES " | grep -q ' alpha '; then
            echo "XPLAT_BASE_URL=https://alpha.deadrop.io/" >> "$GITHUB_ENV"
          elif [ -n "$BRANCHES" ]; then
            # Live PR/feature preview — test at its own Vercel URL
            echo "XPLAT_BASE_URL=$RAW_URL" >> "$GITHUB_ENV"
          else
            echo "Deploy SHA is head of no branch — superseded, skipping."
            exit 0
          fi

      - name: Run cross-platform e2e tests
        env:
          XPLAT_BASE_URL: ${{ env.XPLAT_BASE_URL }}
          DEADROP_API_URL: ${{ secrets.DEADROP_API_URL }}
          TURN_USERNAME: ${{ secrets.TURN_USERNAME }}
          TURN_PWD: ${{ secrets.TURN_PWD }}
          DROP_TEST_TOKEN: ${{ secrets.DROP_TEST_TOKEN }}
        # test:e2e:run skips the CLI build (already done in the Build CLI step
        # with the required build-time env vars)
        run: CI=true pnpm -F tests test:e2e:run
