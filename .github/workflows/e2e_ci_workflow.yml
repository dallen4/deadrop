name: Cross-Platform E2E Tests

# Runs the 4-way CLI×Web drop/grab matrix (cli→cli, cli→web, web→cli, web→web)
# against the deployed stack.
#
# Triggered three ways:
#   1. pull_request on cli/shared/tests paths → catches CLI/shared code changes
#      that don't trigger a web redeploy. BASE_URL defaults to alpha.deadrop.io
#   2. deployment_status success (Vercel fires this) → resolves URL like web_ci.
#      This already covers every alpha/main/PR-preview deploy, so there is no
#      `push:` trigger — it would just double-count alpha against deployment_status.
#   3. workflow_dispatch → manual run against alpha.deadrop.io
on:
  pull_request:
    branches: [main, alpha]
    paths:
      - 'cli/**'
      - 'shared/**'
      - 'tests/**'
  deployment_status:
  workflow_dispatch:

concurrency:
  # Include the deployment_status state in the group: Vercel can emit several
  # deployments per commit (some error, some succeed), all in the same
  # environment. Without the state, an error/in_progress event would cancel the
  # legitimate success run via cancel-in-progress. Keying on state isolates the
  # success run while still superseding an older success run on a newer deploy.
  # For PRs the state is empty, so it groups per ref as before.
  group: ${{ github.workflow }}-${{ github.event.deployment.environment || github.ref }}-${{ github.event.deployment_status.state }}
  cancel-in-progress: true

jobs:
  cross-platform-e2e:
    # deployment_status fires for every state change (pending, error, failure,
    # success). Only run on a successful deploy, AND only for real Vercel
    # deploys: jobs that declare `environment:` make GitHub create their own
    # deployment status, which re-triggers this workflow in a loop. The status
    # CREATOR is the right discriminator (the deployment.creator is always the
    # repo owner; Vercel posts its statuses as vercel[bot] while the Actions
    # loop statuses come from the repo owner). Skipping non-vercel statuses
    # breaks the loop before `environment:` activates.
    if: >-
      github.event_name != 'deployment_status' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.creator.login == 'vercel[bot]')
    runs-on: macos-latest
    timeout-minutes: 20
    # Preview environment — same rationale as cli_e2e: Production key is expired
    # and we don't want this coupled to Production deploys.
    environment: Preview
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          # node 24 hangs Playwright browser install on macOS (chromium stalls
          # silently after download completes).
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        env:
          DEADROP_API_URL: ${{ secrets.DEADROP_API_URL }}
          PEER_SERVER_URL: ${{ secrets.PEER_SERVER_URL }}
          TURN_USERNAME: ${{ secrets.TURN_USERNAME }}
          TURN_PWD: ${{ secrets.TURN_PWD }}
        run: pnpm -F cli build

      - name: Install Playwright browsers
        run: pnpm -F tests exec playwright install chromium --with-deps

      - name: Resolve XPLAT_BASE_URL
        id: resolve-url
        shell: bash
        # Namespaced as XPLAT_ because Vitest/Vite reserves BASE_URL for its own
        # base path and would clobber it (see tests/utils/config.ts).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_SHA: ${{ github.event.deployment.sha }}
          DEPLOY_ENV: ${{ github.event.deployment.environment }}
          RAW_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          if [ "${{ github.event_name }}" != "deployment_status" ]; then
            # push / pull_request / workflow_dispatch — always test alpha
            echo "XPLAT_BASE_URL=https://alpha.deadrop.io/" >> "$GITHUB_ENV"
            exit 0
          fi

          BRANCHES=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/commits/$DEPLOY_SHA/branches-where-head" \
            | node -e "const d=require('fs').readFileSync(0,'utf8');try{console.log(JSON.parse(d).map(b=>b.name).join(' '))}catch{}")
          echo "Deployment commit is head of: [$BRANCHES]"

          if [ "$DEPLOY_ENV" = "Production" ]; then
            echo "XPLAT_BASE_URL=https://deadrop.io/" >> "$GITHUB_ENV"
          elif printf '%s' " $BRANCHES " | grep -q ' alpha '; then
            echo "XPLAT_BASE_URL=https://alpha.deadrop.io/" >> "$GITHUB_ENV"
          elif [ -n "$BRANCHES" ]; then
            # Live PR/feature preview — test at its own Vercel URL
            echo "XPLAT_BASE_URL=$RAW_URL" >> "$GITHUB_ENV"
          else
            echo "Deploy SHA is head of no branch — superseded, skipping."
            exit 0
          fi

      - name: Run cross-platform e2e tests
        env:
          XPLAT_BASE_URL: ${{ env.XPLAT_BASE_URL }}
          DEADROP_API_URL: ${{ secrets.DEADROP_API_URL }}
          TURN_USERNAME: ${{ secrets.TURN_USERNAME }}
          TURN_PWD: ${{ secrets.TURN_PWD }}
          DROP_TEST_TOKEN: ${{ secrets.DROP_TEST_TOKEN }}
        # test:e2e:run skips the CLI build (already done in the Build CLI step
        # with the required build-time env vars)
        run: CI=true pnpm -F tests test:e2e:run
