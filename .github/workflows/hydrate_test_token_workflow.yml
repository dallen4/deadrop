name: Hydrate Test Token

# Rotates the stable e2e bypass token (shared/tests/http.ts's `test_tkn` key)
# in Redis. All three e2e suites (web, cli, cross-platform) read this value
# live per-run rather than seeding/tearing it down themselves, so it has to
# exist independently of any test run — this is what keeps it there.
#
# Daily, not hourly: the token only bypasses captcha/rate-limiting in test
# mode, not a real credential, so there's no security upside to rotating it
# more often — and more frequent rotation only raises the odds of landing
# mid-run (see the concurrency group below).
on:
  schedule:
    - cron: '17 9 * * *' # ~daily, off the hour to avoid GitHub's :00 pile-up
  workflow_dispatch:

concurrency:
  # Shares a group with e2e_ci_workflow.yml's per-ref groups so a rotation
  # queues behind any in-flight e2e run instead of yanking the token out from
  # under it. cancel-in-progress: false — queue, don't cancel either side.
  group: test-token-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hydrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Hydrate test token
        env:
          REDIS_REST_URL: ${{ secrets.REDIS_REST_URL }}
          REDIS_REST_TOKEN: ${{ secrets.REDIS_REST_TOKEN }}
        run: pnpm hydrate:test-token
